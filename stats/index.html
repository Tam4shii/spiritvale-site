<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SpiritVale — Patch Stats Dashboard</title>
<meta name="description" content="Patch cadence, change totals, and top tags for SpiritVale (Steam app 3918510).">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="canonical" href="https://spiritvale.tama.sh/stats/">
<style>
  :root{
    --bg:#0a0612;--fg:#e8e3f0;--muted:#8b82a0;
    --accent:#a78bfa;--accent-2:#7c3aed;
    --card:rgba(167,139,250,.08);--border:rgba(167,139,250,.2);
    --added:#34d399;--changed:#fbbf24;--fixed:#60a5fa;--removed:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Inter","Noto Sans Thai",sans-serif;
    background:var(--bg);color:var(--fg);line-height:1.6;min-height:100vh;padding:2rem;
    background-image:
      radial-gradient(at 20% 30%,rgba(124,58,237,.15),transparent 50%),
      radial-gradient(at 80% 70%,rgba(167,139,250,.1),transparent 50%);
  }
  main{max-width:860px;margin:0 auto}
  header{margin-bottom:2rem}
  .breadcrumb{font-size:.8rem;color:var(--muted);margin-bottom:.5rem}
  .breadcrumb a{color:var(--muted);text-decoration:none}
  .breadcrumb a:hover{color:var(--accent)}
  h1{font-size:1.8rem;font-weight:700;color:var(--accent);margin-bottom:.25rem}
  .subtitle{color:var(--muted);font-size:.95rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
  .stat-card{
    background:var(--card);border:1px solid var(--border);border-radius:.75rem;
    padding:1rem 1.25rem;
  }
  .stat-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem}
  .stat-value{font-size:2rem;font-weight:700;color:var(--accent)}
  .stat-sub{font-size:.8rem;color:var(--muted);margin-top:.1rem}
  section{margin-bottom:2rem}
  h2{font-size:1.1rem;font-weight:600;color:var(--fg);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
  .bar-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;font-size:.85rem}
  .bar-label{width:110px;text-align:right;color:var(--muted);flex-shrink:0}
  .bar-track{flex:1;background:rgba(167,139,250,.1);border-radius:999px;height:10px;overflow:hidden}
  .bar-fill{height:100%;border-radius:999px;transition:width .6s ease}
  .bar-count{width:36px;text-align:right;color:var(--fg);font-variant-numeric:tabular-nums}
  .cadence-list{display:flex;flex-direction:column;gap:.4rem}
  .cadence-row{
    display:flex;align-items:center;gap:.75rem;
    background:var(--card);border:1px solid var(--border);
    border-radius:.5rem;padding:.5rem .75rem;font-size:.85rem;
  }
  .cadence-ver{color:var(--accent);font-weight:600;width:68px;flex-shrink:0}
  .cadence-date{color:var(--muted);width:90px;flex-shrink:0}
  .cadence-gap{color:var(--fg)}
  .gap-pill{
    display:inline-block;padding:.1rem .5rem;border-radius:999px;font-size:.75rem;font-weight:600;
  }
  .gap-fast{background:rgba(52,211,153,.15);color:#34d399}
  .gap-med{background:rgba(251,191,36,.15);color:#fbbf24}
  .gap-slow{background:rgba(248,113,113,.15);color:#f87171}
  .gap-none{background:var(--card);color:var(--muted)}
  .freshness{
    display:inline-flex;align-items:center;gap:.4rem;
    font-size:.75rem;color:var(--muted);margin-top:1.5rem;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--added)}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  #error{display:none;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);
    color:#f87171;padding:1rem;border-radius:.5rem;margin-bottom:1.5rem}
  /* Health status banner — SteamDB pattern: public "is the data fresh?" signal */
  #health-banner{display:none;flex-wrap:wrap;align-items:center;gap:.6rem;
    padding:.65rem 1rem;border-radius:.625rem;margin-bottom:1.5rem;border:1px solid var(--border);font-size:.8rem}
  #health-banner.sev-ok{background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.3)}
  #health-banner.sev-warn{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.3)}
  #health-banner.sev-crit{background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.3)}
  .h-pill{font-size:.7rem;font-weight:700;padding:.15rem .55rem;border-radius:999px}
  .h-pill.ok{background:rgba(52,211,153,.2);color:#34d399}
  .h-pill.warn{background:rgba(251,191,36,.2);color:#fbbf24}
  .h-pill.crit{background:rgba(248,113,113,.2);color:#f87171}
  .h-meta{color:var(--muted)}.h-meta strong{color:var(--fg)}
  .h-links{margin-left:auto;color:var(--muted)}
</style>
<!-- LD+JSON START -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "SpiritVale Patch Statistics",
  "description": "Aggregated patch statistics for SpiritVale — change frequency, tag distribution, and version history.",
  "url": "https://spiritvale.tama.sh/stats/",
  "isPartOf": {
    "@type": "WebSite",
    "url": "https://spiritvale.tama.sh/"
  }
}
</script>
<!-- LD+JSON END -->
</head>
<body>
<main>
  <header>
    <p class="breadcrumb"><a href="/">SpiritVale</a> › Stats</p>
    <h1>Patch Stats</h1>
    <p class="subtitle">Cadence, change totals, and top tags — rendered from <a href="/stats.json">stats.json</a></p>
  </header>

  <div id="error">Failed to load stats.json — try refreshing.</div>

  <!-- Health banner — fetches api/health.json (SteamDB "is data fresh?" pattern) -->
  <div id="health-banner"></div>

  <div class="grid" id="kpi-grid"></div>

  <section>
    <h2>Change Totals</h2>
    <div id="change-bars"></div>
  </section>

  <section>
    <h2>Per-Version Changes <span style="font-size:.8rem;color:var(--muted);font-weight:400">(newest → oldest)</span></h2>
    <div id="perversion-list"></div>
  </section>

  <section>
    <h2>Top Tags</h2>
    <div id="tag-bars"></div>
  </section>

  <section>
    <h2>Patch Cadence <span style="font-size:.8rem;color:var(--muted);font-weight:400">(newest → oldest)</span></h2>
    <div class="cadence-list" id="cadence-list"></div>
  </section>

  <div class="freshness"><span class="dot"></span><span id="polled-at">loading…</span></div>
</main>

<script>
(async () => {
  let s, h;
  try {
    const res = await fetch('/stats.json');
    if (!res.ok) throw new Error(res.status);
    s = await res.json();
  } catch (e) {
    document.getElementById('error').style.display = 'block';
    return;
  }

  // Health banner — best-effort; never blocks stats rendering
  try {
    const hr = await fetch('/api/health.json');
    if (hr.ok) h = await hr.json();
  } catch (e) { /* silent */ }

  if (h) {
    const sev = h.severity || 'warn';
    const pillCls = {ok:'ok', warn:'warn', critical:'crit'}[sev] || 'warn';
    const bannerCls = {ok:'sev-ok', warn:'sev-warn', critical:'sev-crit'}[sev] || 'sev-warn';
    const driftHtml = h.steam_baseline_match
      ? '<strong style="color:#34d399">✓ baseline match</strong>'
      : '<strong style="color:#f87171">⚠ baseline drift</strong>';
    // steam_newsitems_baseline is the STEAM_NEWS_COUNT sentinel (hardcoded API count= param)
    const countNote = h.steam_newsitems_baseline != null
      ? `<span title="STEAM_NEWS_COUNT: hardcoded count= parameter sent to Steam API — not a dynamic total">${h.steam_newsitems_baseline} newsitems (count= sentinel)</span>`
      : '';
    const banner = document.getElementById('health-banner');
    banner.className = bannerCls;
    banner.innerHTML =
      `<span class="h-pill ${pillCls}">${sev.toUpperCase()}</span>` +
      `<span class="h-meta">Polled <strong>${h.hours_since_poll != null ? h.hours_since_poll.toFixed(1) + 'h ago' : 'unknown'}</strong></span>` +
      `<span class="h-meta">Steam: ${driftHtml}</span>` +
      (countNote ? `<span class="h-meta">${countNote}</span>` : '') +
      `<span class="h-links"><a href="/api/health.json">health.json</a> · <a href="/state/steam-news-baseline.json">baseline</a></span>`;
    banner.style.display = 'flex';
  }

  // KPI cards
  const kpis = [
    { label: 'Total patches', value: s.total_patches, sub: `latest v${s.latest_version}` },
    { label: 'Changelog entries', value: s.total_entries, sub: 'across all versions' },
    { label: 'Avg cadence', value: s.avg_days_between_patches + 'd', sub: 'between releases' },
    { label: 'Changes', value: s.change_totals.changed, sub: 'balance tweaks' },
    { label: 'Additions', value: s.change_totals.added, sub: 'new content' },
    { label: 'Bug fixes', value: s.change_totals.fixed, sub: 'issues resolved' },
  ];
  document.getElementById('kpi-grid').innerHTML = kpis.map(k =>
    `<div class="stat-card"><div class="stat-label">${k.label}</div><div class="stat-value">${k.value}</div><div class="stat-sub">${k.sub}</div></div>`
  ).join('');

  // Change totals bars
  const ct = s.change_totals;
  const ctMax = Math.max(...Object.values(ct));
  const ctColors = { added: 'var(--added)', changed: 'var(--changed)', fixed: 'var(--fixed)', removed: 'var(--removed)' };
  const ctLabels = { added: '🟢 Added', changed: '🟡 Changed', fixed: '🔵 Fixed', removed: '🔴 Removed' };
  document.getElementById('change-bars').innerHTML = Object.entries(ct).map(([k, v]) =>
    `<div class="bar-row">
      <span class="bar-label">${ctLabels[k] || k}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/ctMax*100)}%;background:${ctColors[k]||'var(--accent)'}"></div></div>
      <span class="bar-count">${v}</span>
    </div>`
  ).join('');

  // Per-version stacked breakdown (wago.tools "changes-per-patch" pattern)
  if (s.per_version_changes && s.per_version_changes.length) {
    const pvMax = Math.max(...s.per_version_changes.map(v => {
      const c = v.counts; return (c.added||0) + (c.changed||0) + (c.fixed||0) + (c.removed||0);
    }));
    const seg = (n, color, label) => n > 0
      ? `<div title="${label}: ${n}" style="width:${Math.round(n/pvMax*100)}%;height:100%;background:${color};flex-shrink:0"></div>`
      : '';
    document.getElementById('perversion-list').innerHTML = s.per_version_changes.map(v => {
      const c = v.counts;
      const total = (c.added||0) + (c.changed||0) + (c.fixed||0) + (c.removed||0);
      return `<div class="bar-row">
        <span class="bar-label" style="width:68px"><a href="/patch/?v=${v.version}">v${v.version}</a></span>
        <div class="bar-track" style="display:flex;gap:1px">
          ${seg(c.added,'var(--added)','Added')}${seg(c.changed,'var(--changed)','Changed')}${seg(c.fixed,'var(--fixed)','Fixed')}${seg(c.removed,'var(--removed)','Removed')}
        </div>
        <span class="bar-count" style="min-width:52px;font-size:.75rem">${total}</span>
      </div>`;
    }).join('');
  }

  // Top tags bars
  const tagMax = s.top_tags[0]?.count || 1;
  document.getElementById('tag-bars').innerHTML = s.top_tags.map(t =>
    `<div class="bar-row">
      <span class="bar-label"><a href="${t.url}">${t.tag}</a></span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(t.count/tagMax*100)}%;background:var(--accent)"></div></div>
      <span class="bar-count">${t.count}</span>
    </div>`
  ).join('');

  // Patch cadence rows
  function gapClass(d) {
    if (d == null) return 'gap-none';
    if (d <= 7) return 'gap-fast';
    if (d <= 21) return 'gap-med';
    return 'gap-slow';
  }
  document.getElementById('cadence-list').innerHTML = s.patch_cadence.map(c =>
    `<div class="cadence-row">
      <span class="cadence-ver">v${c.version}</span>
      <span class="cadence-date">${c.date}</span>
      <span class="gap-pill ${gapClass(c.days_since_prev)}">${c.days_since_prev != null ? c.days_since_prev + 'd gap' : 'first patch'}</span>
    </div>`
  ).join('');

  // Freshness footer
  if (s.last_polled_at) {
    const d = new Date(s.last_polled_at);
    const ago = Math.round((Date.now() - d) / 3600000);
    document.getElementById('polled-at').textContent =
      `Steam polled ${ago < 1 ? 'just now' : ago + 'h ago'} · ${d.toUTCString()}`;
  }
})();
</script>
</body>
</html>
