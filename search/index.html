<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SpiritVale — Patch Search</title>
<meta name="description" content="Full-text search across all SpiritVale patch history. Find any buff, nerf, or feature by keyword.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="canonical" href="https://spiritvale.tama.sh/search/">
<link rel="alternate" type="application/atom+xml" href="https://spiritvale.tama.sh/feed.xml" title="SpiritVale Patch Notes Feed">
<link rel="alternate" type="application/feed+json" href="https://spiritvale.tama.sh/feed.json" title="SpiritVale Patch Notes (JSON Feed)">
<style>
  :root {
    --bg: #0a0612;
    --fg: #e8e3f0;
    --muted: #8b82a0;
    --accent: #a78bfa;
    --accent-2: #7c3aed;
    --card: rgba(167, 139, 250, 0.08);
    --border: rgba(167, 139, 250, 0.2);
    --added: #86efac;
    --changed: #fcd34d;
    --fixed: #93c5fd;
    --removed: #fca5a5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem;
    background-image: radial-gradient(at 20% 30%, rgba(124, 58, 237, 0.15), transparent 50%),
                      radial-gradient(at 80% 70%, rgba(167, 139, 250, 0.1), transparent 50%);
  }
  main { max-width: 700px; margin: 0 auto; }
  .back { display: inline-block; margin-bottom: 1.5rem; color: var(--muted); text-decoration: none; font-size: 0.9rem; }
  .back:hover { color: var(--accent); }
  h1 {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.03em;
    margin-bottom: 0.4rem;
  }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .search-wrap {
    position: relative;
    margin-bottom: 1.5rem;
  }
  #q {
    width: 100%;
    padding: 0.85rem 1rem 0.85rem 2.8rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--fg);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }
  #q:focus { border-color: var(--accent); }
  #q::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }
  .hint { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 2rem 0; }
  .result-count { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }
  .result-group {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
  }
  .result-version-header {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .result-version-header a {
    font-weight: 700;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.95rem;
  }
  .result-version-header a:hover { text-decoration: underline; }
  .result-patch-title { color: var(--fg); font-size: 0.9rem; }
  .result-date { color: var(--muted); font-size: 0.8rem; margin-left: auto; }
  .result-item {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(167,139,250,0.07);
    font-size: 0.9rem;
  }
  .result-item:last-child { border-bottom: none; }
  .type-badge {
    flex-shrink: 0;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
  }
  .type-added   { background: rgba(134,239,172,0.12); color: var(--added); }
  .type-changed { background: rgba(252,211, 77,0.12); color: var(--changed); }
  .type-fixed   { background: rgba(147,197,253,0.12); color: var(--fixed); }
  .type-removed { background: rgba(252,165,165,0.12); color: var(--removed); }
  mark { background: rgba(167,139,250,0.3); color: var(--fg); border-radius: 2px; padding: 0 1px; }
  footer { color: var(--muted); margin-top: 2rem; font-size: 0.85rem; text-align: center; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<main>
  <a class="back" href="/">← Home</a>
  <h1>Patch Search</h1>
  <p class="subtitle">Search across <span id="total">…</span> change entries from 9 patches</p>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="q" type="search" placeholder="e.g. shadow step, paladin, siphon…" autocomplete="off" autofocus>
  </div>

  <div id="results"><p class="hint">Type to search across all patch history</p></div>

  <footer>
    <a href="/">Home</a> · <a href="/patch/">All Patches</a> · <a href="/diff/">Version Diff</a>
  </footer>
</main>
<script>
let allEntries = [];

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const lower = text.toLowerCase();
  const lq = q.toLowerCase();
  let out = '', pos = 0;
  while (true) {
    const idx = lower.indexOf(lq, pos);
    if (idx === -1) { out += esc(text.slice(pos)); break; }
    out += esc(text.slice(pos, idx)) + '<mark>' + esc(text.slice(idx, idx + q.length)) + '</mark>';
    pos = idx + q.length;
  }
  return out;
}

function debounce(fn, ms) {
  let t;
  return function() { clearTimeout(t); t = setTimeout(() => fn.apply(this, arguments), ms); };
}

function doSearch() {
  const q = document.getElementById('q').value.trim();
  const el = document.getElementById('results');

  if (!q) {
    el.innerHTML = '<p class="hint">Type to search across all patch history</p>';
    return;
  }

  const lq = q.toLowerCase();
  const hits = allEntries.filter(e =>
    e.text.toLowerCase().includes(lq) || e.patch_title.toLowerCase().includes(lq)
  );

  if (!hits.length) {
    el.innerHTML = '<p class="hint">No results for "' + esc(q) + '"</p>';
    return;
  }

  // Group by version (preserve order — entries are sorted oldest→newest by build script)
  const grouped = new Map();
  for (const e of hits) {
    if (!grouped.has(e.version)) grouped.set(e.version, { meta: e, items: [] });
    grouped.get(e.version).items.push(e);
  }

  const groups = [...grouped.values()].reverse(); // newest first

  el.innerHTML = '<div class="result-count">' + hits.length + ' result' + (hits.length === 1 ? '' : 's') +
    ' in ' + groups.length + ' patch' + (groups.length === 1 ? '' : 'es') + '</div>' +
    groups.map(({ meta, items }) =>
      '<div class="result-group">' +
        '<div class="result-version-header">' +
          '<a href="' + esc(meta.url) + '">v' + esc(meta.version) + '</a>' +
          '<span class="result-patch-title">' + esc(meta.patch_title) + '</span>' +
          '<span class="result-date">' + esc(meta.date) + '</span>' +
        '</div>' +
        items.map(e =>
          '<div class="result-item">' +
            '<span class="type-badge type-' + e.type + '">' + e.type + '</span>' +
            '<span>' + highlight(e.text, q) + '</span>' +
          '</div>'
        ).join('') +
      '</div>'
    ).join('');
}

async function init() {
  try {
    const data = await fetch('/search-index.json').then(r => r.json());
    allEntries = data.entries;
    document.getElementById('total').textContent = data.total;
  } catch(_) {
    document.getElementById('results').innerHTML = '<p class="hint">Could not load search index. Try refreshing.</p>';
    return;
  }
  const input = document.getElementById('q');
  input.addEventListener('input', debounce(doSearch, 120));
  // Restore query from URL ?q=
  const params = new URLSearchParams(location.search);
  if (params.get('q')) { input.value = params.get('q'); doSearch(); }
}

init();
</script>
</body>
</html>
