name: Pull Steam News → Patch Draft

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC daily
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Steam news & create draft
        id: draft
        run: python3 .github/scripts/pull-steam-news.py
        env:
          STEAM_APPID: '3918510'

      - name: Rebuild stats + health, commit poll timestamp
        run: |
          python3 scripts/build-stats.py
          python3 scripts/build-health.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add patches/index.json stats.json api/health.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update poll timestamp and rebuild stats [skip ci]"
            git push
          fi

      - name: Open PR if draft created
        id: pr
        if: steps.draft.outputs.new_draft == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: steam-patch-draft/${{ steps.draft.outputs.slug }}
          title: "patch: steam draft — ${{ steps.draft.outputs.title }}"
          body: |
            🤖 Auto-generated from Steam news feed (app 3918510).

            Pre-filled: `version`, `title`, `date`, `steam_news_id`, `released_at`, `raw_body`

            **Boss action checklist:**
            1. Open `patches/draft-${{ steps.draft.outputs.slug }}.json`
            2. Classify bullets from `raw_body` into `added` / `changed` / `fixed` / `removed`
            3. Delete the `raw_body` field
            4. Set `"current": true` and flip the previous latest to `false`
            5. Move file to `patches/v{version}.json` and update `patches/index.json`
            6. Merge PR → CF Pages auto-deploys
          labels: patch-draft
          commit-message: "patch: steam draft — ${{ steps.draft.outputs.title }}"

      - name: Discord — announcement detected
        if: steps.draft.outputs.new_announcement == 'true'
        env:
          WEBHOOK: ${{ secrets.DISCORD_PATCH_WEBHOOK }}
          TITLE: ${{ steps.draft.outputs.announcement_title }}
          SLUG: ${{ steps.draft.outputs.announcement_slug }}
        run: |
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"📢 SpiritVale announcement — ${TITLE}\",
                \"color\": 3447003,
                \"description\": \"Non-patch Steam post detected (version \\\"0.0.0\\\").\nSaved to \`patches/drafts/announcement-${SLUG}.json\`.\n\nBoss action: review draft → decide publish / archive / ignore.\",
                \"footer\": { \"text\": \"spiritvale-site · pull-steam-news.yml\" }
              }]
            }"

      - name: Discord — draft review needed
        if: steps.draft.outputs.new_draft == 'true'
        env:
          WEBHOOK: ${{ secrets.DISCORD_PATCH_WEBHOOK }}
          VERSION: ${{ steps.draft.outputs.slug }}
          TITLE: ${{ steps.draft.outputs.title }}
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
        run: |
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔍 SpiritVale draft ready — ${TITLE}\",
                \"url\": \"${PR_URL}\",
                \"color\": 16753920,
                \"description\": \"Steam patch detected. Classify bullets → merge → live.\\n\\n[Open PR](${PR_URL})\",
                \"footer\": { \"text\": \"spiritvale-site · pull-steam-news.yml\" }
              }]
            }"

      - name: Discord — stale draft re-ping
        if: steps.draft.outputs.stale_draft == 'true'
        env:
          WEBHOOK: ${{ secrets.DISCORD_PATCH_WEBHOOK }}
          SLUG: ${{ steps.draft.outputs.stale_draft_slug }}
          CYCLES: ${{ steps.draft.outputs.stale_draft_cycles }}
          FIRST_SEEN: ${{ steps.draft.outputs.stale_draft_first_seen }}
        run: |
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"⏰ SpiritVale draft stale — action needed\",
                \"color\": 15158332,
                \"description\": \"Draft \`${SLUG}\` has been waiting **${CYCLES} poll cycles** without review (first seen: ${FIRST_SEEN}).\n\nBoss action: merge, close, or archive this draft before the next patch lands.\",
                \"footer\": { \"text\": \"spiritvale-site · stale-draft escalation (threshold: 3 cycles)\" }
              }]
            }"
