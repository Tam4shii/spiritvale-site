<style>
  :root {
    --bg: #0a0612;
    --fg: #e8e3f0;
    --muted: #8b82a0;
    --accent: #a78bfa;
    --accent-2: #7c3aed;
    --card: rgba(167, 139, 250, 0.08);
    --border: rgba(167, 139, 250, 0.2);
    --added: #34d399;
    --changed: #fbbf24;
    --deprecated: #f97316;
    --fixed: #60a5fa;
    --removed: #f87171;
    --security: #a3e635;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Noto Sans Thai", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem;
    background-image: radial-gradient(at 20% 30%, rgba(124, 58, 237, 0.15), transparent 50%),
                      radial-gradient(at 80% 70%, rgba(167, 139, 250, 0.1), transparent 50%);
  }
  main { max-width: 800px; margin: 0 auto; }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
    font-size: 0.88rem;
    color: var(--muted);
  }
  .nav a { color: var(--accent); text-decoration: none; }
  .nav a:hover { text-decoration: underline; }

  /* Page header */
  .page-header { margin-bottom: 2rem; }
  .page-header h1 {
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.03em;
    margin-bottom: 0.4rem;
  }
  .page-header .sub { color: var(--muted); font-size: 0.95rem; }

  /* Version card */
  .version-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 1.5rem;
    transition: border-color 0.15s;
  }
  .version-card.current {
    border-color: rgba(167, 139, 250, 0.45);
    box-shadow: 0 0 0 1px rgba(167, 139, 250, 0.15);
  }
  .card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .version-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .current-badge {
    display: inline-block;
    padding: 0.15rem 0.55rem;
    background: rgba(167, 139, 250, 0.15);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    vertical-align: middle;
  }
  .version-date { color: var(--muted); font-size: 0.85rem; white-space: nowrap; }

  /* Sections */
  .sections { display: grid; gap: 0.5rem; }
  .section-heading {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 0.35rem;
  }
  .section-heading.added      { color: var(--added); }
  .section-heading.changed    { color: var(--changed); }
  .section-heading.deprecated { color: var(--deprecated); }
  .section-heading.fixed      { color: var(--fixed); }
  .section-heading.removed    { color: var(--removed); }
  .section-heading.security   { color: var(--security); }
  .section-block { margin-bottom: 0.9rem; }
  .section-block:last-child { margin-bottom: 0; }
  .patch-item {
    padding: 0.3rem 0 0.3rem 0.75rem;
    border-left: 2px solid rgba(167,139,250,0.12);
    font-size: 0.92rem;
    line-height: 1.5;
    position: relative;
    scroll-margin-top: 1rem;
  }
  .patch-item + .patch-item { margin-top: 0.15rem; }
  .patch-item:target, .patch-item.focused {
    border-left-color: var(--accent);
    background: rgba(167,139,250,0.08);
    border-radius: 0 4px 4px 0;
  }
  .entry-anchor {
    position: absolute;
    right: 0.4rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    font-size: 0.78rem;
    color: var(--muted);
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .patch-item:hover .entry-anchor { opacity: 1; }
  .entry-anchor:hover { color: var(--accent); }

  /* Empty state */
  .empty-note {
    color: var(--muted);
    font-size: 0.88rem;
    font-style: italic;
    text-align: center;
    padding: 1rem 0;
  }

  /* Card footer */
  .card-footer {
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(167,139,250,0.1);
    display: flex;
    gap: 1.25rem;
    flex-wrap: wrap;
  }
  .card-footer a {
    color: var(--accent);
    font-size: 0.85rem;
    text-decoration: none;
    opacity: 0.85;
    transition: opacity 0.12s;
  }
  .card-footer a:hover { opacity: 1; text-decoration: underline; }

  /* Affects tag chips + breaking badge */
  .affects-bar {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }
  .affect-chip {
    display: inline-flex;
    align-items: center;
    padding: 0.15rem 0.5rem;
    background: rgba(167,139,250,0.08);
    border: 1px solid rgba(167,139,250,0.18);
    border-radius: 999px;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .breaking-badge {
    display: inline-block;
    padding: 0.15rem 0.55rem;
    background: rgba(248,113,113,0.12);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 999px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--removed);
    vertical-align: middle;
  }

  /* Version jump nav */
  .version-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 2rem;
  }
  .version-chip {
    padding: 0.2rem 0.65rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-family: ui-monospace, "SF Mono", monospace;
    border: 1px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .version-chip:hover { border-color: var(--accent); color: var(--accent); }
  .version-chip.current { border-color: rgba(167,139,250,0.5); color: var(--accent); font-weight: 600; }

  /* Loading / error */
  .state-msg {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 0.95rem;
  }

  footer { color: var(--muted); margin-top: 2rem; font-size: 0.85rem; text-align: center; }
  footer a { color: var(--accent); text-decoration: none; }
  .permalink-link { cursor: pointer; user-select: none; }
</style>
</head>
<body>
<main>
  <nav class="nav">
    <a href="/">SpiritVale</a>
    <span>/</span>
    <span>Patch Notes</span>
  </nav>

  <div class="page-header">
    <h1>Patch Notes</h1>
    <p class="sub">Full archive of all SpiritVale updates</p>
  </div>

  <div id="version-nav" class="version-nav"></div>
  <div id="patches-root"></div>

  <footer>
    Made with 💜 by fans · Not affiliated with the developers<br>
    <a href="https://store.steampowered.com/app/3918510/">Steam Page</a> ·
    <a href="/diff/">Version Diff</a>
  </footer>
</main>
<script>
const SECTIONS = [
  { key: 'added',      label: '🟢 Added',      cls: 'added' },
  { key: 'changed',    label: '🟡 Changed',    cls: 'changed' },
  { key: 'deprecated', label: '🟠 Deprecated', cls: 'deprecated' },
  { key: 'removed',    label: '🔴 Removed',    cls: 'removed' },
  { key: 'fixed',      label: '🔧 Fixed',      cls: 'fixed' },
  { key: 'security',   label: '🛡️ Security',   cls: 'security' },
];

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderEntry(item, entryId) {
  if (entryId) {
    return `<div class="patch-item" id="${esc(entryId)}">${esc(item)}<a class="entry-anchor" href="#${esc(entryId)}" title="Link to this entry" onclick="copyEntryLink(event,'${esc(entryId)}')">#</a></div>`;
  }
  return `<div class="patch-item">${esc(item)}</div>`;
}

function copyEntryLink(e, id) {
  e.preventDefault();
  const url = location.origin + location.pathname + '?focus=' + id;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      const a = e.currentTarget;
      a.textContent = '✓';
      setTimeout(() => { a.textContent = '#'; }, 1500);
    });
  } else {
    location.hash = id;
  }
}

function renderPatch(p) {
  const ids = p.entry_ids || {};
  const sections = SECTIONS
    .filter(s => Array.isArray(p[s.key]) && p[s.key].length > 0)
    .map(s => `
      <div class="section-block">
        <div class="section-heading ${s.cls}">${s.label}</div>
        ${p[s.key].map((item, i) => renderEntry(item, (ids[s.key] || [])[i])).join('')}
      </div>`)
    .join('');

  const footer = [];
  if (p.url && String(p.url).trim()) footer.push(`<a href="${esc(p.url)}" target="_blank" rel="noopener noreferrer">📝 Full interactive notes →</a>`);
  footer.push(`<a href="/patches/v${esc(p.version)}.json">📦 Raw JSON →</a>`);
  if (p.steam_url && String(p.steam_url).trim()) footer.push(`<a href="${esc(p.steam_url)}" target="_blank" rel="noopener noreferrer">🎮 View on Steam →</a>`);
  footer.push(`<a href="/patch/${esc(p.version)}" class="permalink-link" data-version="${esc(p.version)}" title="Copy link to this patch">🔗 Share</a>`);

  const affectsHtml = Array.isArray(p.affects) && p.affects.length
    ? `<div class="affects-bar">${p.affects.map(tag => `<span class="affect-chip">🏷 ${esc(tag)}</span>`).join('')}</div>`
    : '';

  return `<div class="version-card${p.current ? ' current' : ''}" id="v-${esc(p.version)}">
    <div class="card-header">
      <span class="version-title">
        v${esc(p.version)} — ${esc(p.title)}
        ${p.current ? '<span class="current-badge">Latest</span>' : ''}
        ${p.breaking ? '<span class="breaking-badge">⚠️ Breaking</span>' : ''}
      </span>
      <span class="version-date">${esc(p.date)}</span>
    </div>
    <div class="sections">
      ${sections || '<p class="empty-note">Patch notes coming soon…</p>'}
    </div>
    ${affectsHtml}
    <div class="card-footer">${footer.join('')}</div>
  </div>`;
}

function scrollToVersion(version) {
  const el = document.getElementById(`v-${version}`);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  el.style.transition = 'box-shadow 0.3s';
  el.style.boxShadow = '0 0 0 2px rgba(167,139,250,0.6)';
  setTimeout(() => { el.style.boxShadow = ''; }, 1800);
}

async function loadAll() {
  const root = document.getElementById('patches-root');
  root.innerHTML = '<p class="state-msg">Loading patch notes…</p>';
  try {
    const indexRes = await fetch('/patches/index.json');
    if (!indexRes.ok) throw new Error('fetch failed');
    const index = await indexRes.json();
    const entries = index.versions || [];

    if (!entries.length) {
      root.innerHTML = '<p class="state-msg">No patch notes yet.</p>';
      return;
    }

    const nav = document.getElementById('version-nav');
    if (nav) {
      nav.innerHTML = entries.map(v =>
        `<a class="version-chip${v.current ? ' current' : ''}" href="#v-${esc(v.version)}">v${esc(v.version)}</a>`
      ).join('');
    }

    // Fetch full data for each version via its immutable archive URL.
    // Guard against missing archive_url (seeded entries, future schema gaps) to
    // avoid firing fetch("undefined") which wastes a round-trip and logs a 404.
    const patches = await Promise.all(
      entries.map(v =>
        v.archive_url
          ? fetch(v.archive_url).then(r => r.ok ? r.json() : v).catch(() => v)
          : Promise.resolve(v)
      )
    );

    root.innerHTML = patches.map(renderPatch).join('');

    const params = new URLSearchParams(location.search);
    const vParam = params.get('v');
    const focusParam = params.get('focus');
    if (vParam) scrollToVersion(vParam);
    if (focusParam) {
      const el = document.getElementById(focusParam);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.add('focused');
        setTimeout(() => el.classList.remove('focused'), 2500);
      }
    }
  } catch (e) {
    root.innerHTML = '<p class="state-msg">Could not load patch notes. Try refreshing.</p>';
  }
}

loadAll();

document.addEventListener('click', function(e) {
  const a = e.target.closest('.permalink-link');
  if (!a) return;
  const v = a.dataset.version;
  const url = location.origin + '/patch/' + v;
  if (navigator.clipboard) {
    e.preventDefault();
    navigator.clipboard.writeText(url).then(() => {
      const orig = a.textContent;
      a.textContent = '✓ Copied!';
      setTimeout(() => { a.textContent = orig; }, 1800);
    });
  }
});
</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js');</script>
</body>
