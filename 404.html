<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — SpiritVale</title>
<style>
  :root {
    --bg: #0a0612;
    --fg: #e8e3f0;
    --muted: #8b82a0;
    --accent: #a78bfa;
    --accent-2: #7c3aed;
    --card: rgba(167, 139, 250, 0.08);
    --border: rgba(167, 139, 250, 0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-image: radial-gradient(at 20% 30%, rgba(124, 58, 237, 0.15), transparent 50%),
                      radial-gradient(at 80% 70%, rgba(167, 139, 250, 0.1), transparent 50%);
  }
  .container { text-align: center; max-width: 420px; }
  .glyph {
    font-size: 5rem;
    line-height: 1;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 900;
    letter-spacing: -0.04em;
  }
  h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
  p { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }
  .links { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
  a {
    display: inline-block;
    padding: 0.6rem 1.2rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9rem;
    background: var(--card);
    transition: border-color 0.15s;
  }
  a:hover { border-color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="glyph">404</div>
  <h1>Page not found</h1>
  <p>This area of the Spire hasn't been charted yet.</p>
  <div class="links">
    <a href="/">← Home</a>
    <a href="/patch/">Patch Notes</a>
  </div>
</div>
</body>
</html>
